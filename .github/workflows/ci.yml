name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/chat-analyzer:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
    - name: Pull latest image
      run: /usr/local/bin/docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chat-analyzer:latest || true

    - name: Stop existing container
      run: /usr/local/bin/docker stop chat-analyzer-container || true

    - name: Remove old container
      run: /usr/local/bin/docker rm chat-analyzer-container || true

    - name: Run new container
      run: /usr/local/bin/docker run -d -p 8000:8000 --name chat-analyzer-container ${{ secrets.DOCKERHUB_USERNAME }}/chat-analyzer:latest